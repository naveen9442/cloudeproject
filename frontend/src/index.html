<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Product Management System</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Full Stack Product Management Application built with Angular, Node.js, and MongoDB">
  <meta name="theme-color" content="#667eea">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23667eea'>📦</text></svg>">
  
  <!-- Bootstrap CSS (for responsive utilities) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Product Management System">
  <meta property="og:description" content="Full Stack Application for managing products">
  <meta property="og:image" content="https://via.placeholder.com/1200x630">
  <meta property="og:type" content="website">
  
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Product Management System">
  <meta name="twitter:description" content="Full Stack Product Management Application">
  
  <!-- No-script fallback -->
  <noscript>
    <p style="text-align: center; margin-top: 2rem; color: #666; font-family: Arial, sans-serif;">
      ⚠️ This application requires JavaScript to be enabled. Please enable JavaScript in your browser settings.
    </p>
  </noscript>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
 
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f7fa;
      color: #333;
    }

    app-root {
      display: block;
      min-height: 100vh;
    }

    /* Loading Spinner */
    .app-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: white;
      margin-top: 2rem;
      font-size: 1.1rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <!-- Main App Root -->
  <app-root></app-root>

  <!-- Loading Spinner (shown until Angular bootstraps) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Remove loading spinner when app-root has content
      const checkInterval = setInterval(function() {
        const appRoot = document.querySelector('app-root');
        if (appRoot && appRoot.children.length > 0) {
          clearInterval(checkInterval);
          // App has loaded
        }
      }, 100);

      // Fallback: hide loading after 5 seconds
      setTimeout(function() {
        clearInterval(checkInterval);
      }, 5000);
    });
  </script>

  <!-- Bootstrap JS (for responsive features) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
