<!-- frontend/src/app/components/product-update/product-update.component.html -->
<div class="row">
  <div class="col-md-8 offset-md-2">
    <h2>Edit Product</h2>

    <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
      {{ error }}
      <button type="button" class="btn-close" (click)="error = null"></button>
    </div>

    <div *ngIf="loading && !product.name" class="text-center">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="product.name">
      <div class="mb-3">
        <label for="name" class="form-label">Product Name *</label>
        <input
          type="text"
          class="form-control"
          id="name"
          [(ngModel)]="product.name"
          name="name"
          required
        />
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description *</label>
        <textarea
          class="form-control"
          id="description"
          rows="4"
          [(ngModel)]="product.description"
          name="description"
          required
        ></textarea>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="mb-3">
            <label for="price" class="form-label">Price *</label>
            <input
              type="number"
              class="form-control"
              id="price"
              [(ngModel)]="product.price"
              name="price"
              min="0"
              step="0.01"
              required
            />
          </div>
        </div>

        <div class="col-md-6">
          <div class="mb-3">
            <label for="stock" class="form-label">Stock Quantity</label>
            <input
              type="number"
              class="form-control"
              id="stock"
              [(ngModel)]="product.stock"
              name="stock"
              min="0"
            />
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label for="category" class="form-label">Category *</label>
        <select class="form-select" id="category" [(ngModel)]="product.category" name="category" required>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="image" class="form-label">Image URL</label>
        <input type="text" class="form-control" id="image" [(ngModel)]="product.image" name="image" />
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ loading ? 'Saving...' : 'Save Changes' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
